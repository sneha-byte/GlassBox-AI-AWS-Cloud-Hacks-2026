AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GlassBox AI — Serverless Platform (Role 3)

Parameters:
  BedrockAgentId:
    Type: String
    Default: AJFMFVPX2D
  BedrockAgentAliasId:
    Type: String
    Default: P6KDX0BDII
  KnowledgeBaseId:
    Type: String
    Default: 4VLZUJAC0T

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 256
    Environment:
      Variables:
        TRACES_TABLE: !Ref TracesTable
        STADIUMS_TABLE: !Ref StadiumsTable
        WS_CONNECTIONS_TABLE: !Ref WsConnectionsTable
        BEDROCK_AGENT_ID: !Ref BedrockAgentId
        BEDROCK_AGENT_ALIAS_ID: !Ref BedrockAgentAliasId
        KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId

Resources:
  # -----------------------------------------------------------------------
  # DynamoDB Tables
  # -----------------------------------------------------------------------
  TracesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trace_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: trace_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: session-timestamp-index
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  StadiumsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: stadium_id
          AttributeType: S
      KeySchema:
        - AttributeName: stadium_id
          KeyType: HASH

  WsConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: session-index
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------------------
  # S3 Bucket for Polly audio
  # -----------------------------------------------------------------------
  AudioBucket:
    Type: AWS::S3::Bucket

  # -----------------------------------------------------------------------
  # SNS Topic (extensibility hook)
  # -----------------------------------------------------------------------
  CriticalAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: glassbox-critical-alerts

  # -----------------------------------------------------------------------
  # HTTP API — Trace Ingestion
  # -----------------------------------------------------------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - GET
          - OPTIONS
        AllowHeaders:
          - '*'

  TraceIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: trace_ingest.handler
      CodeUri: lambdas/trace_ingest/
      Timeout: 90
      MemorySize: 512
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
          CRITICAL_SM_ARN: !Ref CriticalEventStateMachine
          SNS_TOPIC_ARN: !Ref CriticalAlertsTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TracesTable
        - DynamoDBReadPolicy:
            TableName: !Ref WsConnectionsTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt CriticalAlertsTopic.TopicName
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt CriticalEventStateMachine.Name
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeAgent
                - bedrock:InvokeModel
                - bedrock:Retrieve
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        PostTrace:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /trace
            Method: POST

  # -----------------------------------------------------------------------
  # WebSocket API — Live Push
  # -----------------------------------------------------------------------
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: glassbox-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub "integrations/${DisconnectIntegration}"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations"

  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: ws_connect.handler
      CodeUri: lambdas/ws_connect/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WsConnectionsTable

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: ws_disconnect.handler
      CodeUri: lambdas/ws_disconnect/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WsConnectionsTable

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  # -----------------------------------------------------------------------
  # DynamoDB Stream → Broadcaster
  # -----------------------------------------------------------------------
  TraceBroadcasterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: trace_broadcaster.handler
      CodeUri: lambdas/trace_broadcaster/
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WsConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TracesTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 1

  # -----------------------------------------------------------------------
  # Step Functions — Critical Event Handler
  # -----------------------------------------------------------------------
  PollyAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: polly_alert.handler
      CodeUri: lambdas/polly_alert/
      Timeout: 30
      Environment:
        Variables:
          AUDIO_BUCKET: !Ref AudioBucket
          WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TracesTable
        - DynamoDBReadPolicy:
            TableName: !Ref WsConnectionsTable
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  PostmortemGenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: postmortem_gen.handler
      CodeUri: lambdas/postmortem_gen/
      Timeout: 60
      Environment:
        Variables:
          WS_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TracesTable
        - DynamoDBReadPolicy:
            TableName: !Ref WsConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdas
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt PollyAlertFunction.Arn
                  - !GetAtt PostmortemGenFunction.Arn

  CriticalEventStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${AWS::StackName}-critical-events"
      StateMachineType: EXPRESS
      RoleArn: !GetAtt StepFunctionsRole.Arn
      DefinitionString: !Sub |
        {
          "Comment": "GlassBox Critical Event Handler",
          "StartAt": "FanOut",
          "States": {
            "FanOut": {
              "Type": "Parallel",
              "Branches": [
                {
                  "StartAt": "SynthesizeVoice",
                  "States": {
                    "SynthesizeVoice": {
                      "Type": "Task",
                      "Resource": "arn:aws:states:::lambda:invoke",
                      "Parameters": {
                        "FunctionName": "${PollyAlertFunction.Arn}",
                        "Payload.$": "$"
                      },
                      "End": true
                    }
                  }
                },
                {
                  "StartAt": "GeneratePostmortem",
                  "States": {
                    "GeneratePostmortem": {
                      "Type": "Task",
                      "Resource": "arn:aws:states:::lambda:invoke",
                      "Parameters": {
                        "FunctionName": "${PostmortemGenFunction.Arn}",
                        "Payload.$": "$"
                      },
                      "Retry": [
                        {
                          "ErrorEquals": ["States.ALL"],
                          "MaxAttempts": 2,
                          "BackoffRate": 2
                        }
                      ],
                      "End": true
                    }
                  }
                }
              ],
              "Next": "Done"
            },
            "Done": {
              "Type": "Succeed"
            }
          }
        }

Outputs:
  HttpApiUrl:
    Description: HTTP API endpoint for trace ingestion
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  WebSocketUrl:
    Description: WebSocket URL for live trace streaming
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  TracesTableName:
    Value: !Ref TracesTable
  StadiumsTableName:
    Value: !Ref StadiumsTable
  CriticalStateMachineArn:
    Value: !Ref CriticalEventStateMachine
  AudioBucketName:
    Value: !Ref AudioBucket
